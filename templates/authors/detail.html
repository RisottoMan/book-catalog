{% extends 'base.html' %}

{% block content %}

<a class="back" href="{% url 'book_list' %}">← Назад</a>

<h2>{{ author.full_name }}</h2>

<h3>Книги автора</h3>

<div class="books">

{% for book in book_list %}

<a class="book-card" href="{% url 'book_detail' book.slug %}">

<h3>{{ book.title }}</h3>

<p>{{ book.genre }}</p>

</a>

{% endfor %}

</div>

{% endblock %}
